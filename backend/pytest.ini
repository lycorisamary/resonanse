[pytest]
# Добавляем backend и корень проекта в PYTHONPATH, чтобы работало 'from app import ...'
pythonpath = . ..
# Автоматический режим для асинхронных тестов
asyncio_mode = auto
# Важно для Windows/asyncpg: один event loop на всю сессию тестов,
# иначе соединения могут "переехать" между лупами и падать с InterfaceError.
asyncio_default_fixture_loop_scope = session
# Указываем, где лежат тесты
testpaths = tests
# Игнорируем предупреждения, чтобы они не мешали видеть ошибки
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning